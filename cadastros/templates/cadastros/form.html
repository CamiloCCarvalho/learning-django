{% extends 'modelo.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}
    <title>Formulario - Cadastrar</title>
{% endblock %}

{% block content %}
    <div class='container bg- mt-5'>
        <h5 class='text-center'>Cadastro | Atividade</h5>

        <p class='text-center lead'>Cadastrar novo Campo | Atividade</p>

        <hr>

        <form class='text-center' action='' method='POST'>
            {% csrf_token %}

            {{ form.as_p }}

            <div>
            <button type='submit' class='btn btn-primary mt-2 mb-5'>
                Cadastrar
                <i class="fa fa-edit" aria-hidden="true"></i>
            </button>
            <a href="{% url 'home' %}" class="btn btn-primary mt-2 mb-5" title='Voltar Inicio'>Voltar
                <i class="fa fa-home" aria-hidden="true"></i>
            </a>
            </div>
        </form>
        
    </div>
{% endblock %}
